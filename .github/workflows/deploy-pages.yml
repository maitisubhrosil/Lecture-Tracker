name: Update Schedule & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Midnight UTC = 5:30 AM IST (India Standard Time)
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Fetch latest schedule from Google Sheets
        run: pnpm --filter @workspace/scripts run fetch-schedule

      - name: Commit updated schedule data
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/schedule/public/schedule-data.json
          git diff --staged --quiet || (git commit -m "chore: update schedule data [skip ci]" && git push)

      - name: Build schedule app
        env:
          NODE_ENV: production
          PORT: "3000"
          BASE_PATH: "/${{ github.event.repository.name }}/"
          # Worker URL for production. Set this as a repo variable:
          #   Settings → Secrets and variables → Actions → Variables → New repo variable
          #   Name: WORKER_API_BASE_URL  Value: https://epgp-reminders.<your-cf-subdomain>.workers.dev
          VITE_API_BASE_URL: ${{ vars.WORKER_API_BASE_URL }}
        run: pnpm --filter @workspace/schedule run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/schedule/dist/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
